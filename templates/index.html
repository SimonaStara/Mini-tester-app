<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mini Tester – manuální GUI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">
    <h2>✅ Mini Tester – manuální GUI</h2>

    /run_test

        <label>Předdefinované URL:</label>
        <select name="alias" onchange="document.getElementById('url').value=this.value">
            <option value="">— Vybrat ručně —</option>
            {% for name, url in aliases.items() %}
                <option value="{{ url }}">{{ name }}</option>
            {% endfor %}
        </select>

        <label>URL k testu:</label>
        <input type="text" id="url" name="url" placeholder="https://…" required>

        <label>Název testu:</label>
        <input type="text" name="test_name" placeholder="Název testu">

        <label>Zařízení:</label>
        <select name="device" required size="10">
            {% for d in devices %}
                <option>{{ d }}</option>
            {% endfor %}
        </select>

        <label>Prohlížeč:</label>
        <select name="browser" required>
            {% for b in browsers %}
                <option>{{ b }}</option>
            {% endfor %}
        </select>

        <button type="submit">▶ SPUSTIT TEST</button>
    </form>
</div>

</body>
</html>
